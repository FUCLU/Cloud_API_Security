server {
    listen 80;
    server_name localhost;
    return 301 https://localhost:9444$request_uri;
}

server {
    listen 443 ssl http2;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /run/secrets/app_tls_cert;
    ssl_certificate_key /run/secrets/app_tls_key;
    ssl_protocols TLSv1.3;
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ^~ /api/ {
        proxy_pass https://waf:8443;
        proxy_http_version 1.1;

        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 9444;

        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;

        proxy_ssl_certificate     /run/secrets/mtls_client_cert;
        proxy_ssl_certificate_key /run/secrets/mtls_client_key;

        proxy_buffer_size          32k;
        proxy_buffers              8 32k;
        proxy_busy_buffers_size    64k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}