# HTTP only redirects to HTTPS for both app and auth hostnames.
server {
    listen 80;
    server_name app.fmsec.shop auth.fmsec.shop;

    return 301 https://$host$request_uri;
}

# Frontend SPA.
server {
    listen 443 ssl http2;
    server_name app.fmsec.shop;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /certs/app.crt;
    ssl_certificate_key /certs/app.key;

    ssl_protocols TLSv1.3;
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Avoid stale level-1 URLs if a browser still requests Keycloak on app host.
    location ^~ /realms/ {
        return 308 https://auth.fmsec.shop$request_uri;
    }

    location ^~ /resources/ {
        return 308 https://auth.fmsec.shop$request_uri;
    }

    location ^~ /admin/ {
        return 308 https://auth.fmsec.shop$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# Public Keycloak endpoint on its own hostname.
server {
    listen 443 ssl http2;
    server_name auth.fmsec.shop;

    ssl_certificate     /certs/auth.crt;
    ssl_certificate_key /certs/auth.key;

    ssl_protocols TLSv1.3;
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Keycloak Admin UI uses same-origin iframes for login/session checks.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
