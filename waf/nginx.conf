server {
    listen 8443 ssl http2;
    server_name api.fmsec.shop;

    ssl_certificate     /run/secrets/kong_tls_cert;
    ssl_certificate_key /run/secrets/kong_tls_key;
    ssl_protocols TLSv1.3;
    ssl_client_certificate /run/secrets/internal_ca_cert;
    ssl_verify_client on;
    ssl_verify_depth 2;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    client_max_body_size 1m;

    if ($request_uri ~* "(\.\./|%2e%2e%2f|%252e%252e%252f)") {
        return 403;
    }

    if ($query_string ~* "(union(\s|%20)+select|sleep\s*\(|benchmark\s*\(|information_schema|load_file\s*\()") {
        return 403;
    }

    if ($query_string ~* "(<script|%3cscript|javascript:|onerror=|onload=)") {
        return 403;
    }

    location / {
        proxy_pass https://kong:8443;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_ssl_server_name on;
        proxy_ssl_name api.fmsec.shop;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 3;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_ssl_certificate /run/secrets/mtls_client_cert;
        proxy_ssl_certificate_key /run/secrets/mtls_client_key;
    }
}
