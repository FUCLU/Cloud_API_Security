# Local Windows/dev override.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Public URLs in this mode:
#   App      : https://localhost:9443
#   Keycloak : https://localhost:8082
#
# The production compose stays domain-based; this file keeps localhost behavior explicit.

volumes:
  keycloak_data:
    name: cloud_api_security_keycloak_data
    external: false

services:
  keycloak:
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8082"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded

  backend:
    environment:
      KEYCLOAK_URL: https://auth.fmsec.shop:8443
      KEYCLOAK_PUBLIC_URL: https://localhost:8082
      FRONTEND_URL: https://localhost:9443
      JWT_ISSUER: https://localhost:8082/realms/cloudapi
      BACKEND_CORS_ORIGINS: https://localhost:9443
      AUTH_COOKIE_SECURE: "true"

  frontend:
    build:
      args:
        VITE_KEYCLOAK_URL: https://localhost:8082
        VITE_KONG_URL: https://localhost:9443/api
        VITE_REALM: ${VITE_REALM}
        VITE_CLIENT_ID: ${VITE_CLIENT_ID}
    volumes:
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
