# D2 reference Nginx edge config.
# The active container config is frontend/nginx.conf.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_protocols TLSv1.3;
    ssl_certificate /etc/nginx/certs/frontend.crt;
    ssl_certificate_key /etc/nginx/certs/frontend.key;

    location / {
        proxy_pass http://frontend:443;
    }
}
