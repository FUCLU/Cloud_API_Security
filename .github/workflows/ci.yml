name: CI - SAST & Secrets Scan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit detect-secrets pip-audit

      - name: Run SAST/SCA evidence script
        run: |
          mkdir -p EVIDENCE/security_scans
          python scripts/security_testing/run_sast.py

      - name: Run secrets scan
        run: |
          detect-secrets scan . \
            --exclude-files '^\.git/' \
            --exclude-files '^node_modules/' \
            --exclude-files '^frontend/node_modules/' \
            --exclude-files '^EVIDENCE/' \
            --exclude-files '^certs/' \
            --exclude-files '^internal-certs/' \
            --exclude-files '^zerossl-downloads/' \
            --exclude-files '(^|/)package-lock\.json$' \
            > EVIDENCE/security_scans/secrets.baseline

      - name: Upload SAST evidence
        uses: actions/upload-artifact@v4
        with:
          name: sast-security-evidence
          path: |
            EVIDENCE/security_scans/bandit_report.json
            EVIDENCE/security_scans/sca_report.txt
            EVIDENCE/security_scans/sast_summary.md
            EVIDENCE/security_scans/secrets.baseline
          if-no-files-found: error
