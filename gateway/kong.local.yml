services:
  - name: backend-service
    url: https://api-backend:9000
    tls_verify: true
    tls_verify_depth: 2
    ca_certificates:
      - 22222222-2222-2222-2222-222222222222   # ← local dev CA

    routes:
      - name: users-route
        paths: [/api/v1/users]
        strip_path: false
      - name: products-route
        paths: [/api/v1/products]
        strip_path: false
      - name: orders-route
        paths: [/api/v1/orders]
        strip_path: false
      - name: auth-route
        paths: [/api/v1/auth]
        strip_path: false
      - name: security-route
        paths: [/api/v1/security]
        strip_path: false
      - name: health-route
        paths: [/health]
        strip_path: false
      - name: root-route
        paths: [/]
        strip_path: false

plugins:
  - name: jwt-hardening

  - name: hsts-header

  - name: opa-authz
    config:
      opa_url: "https://opa:8181/v1/data/authz"
      ssl_verify: false          # ← local: OPA dùng certs-local CA chưa load vào Kong lua
      ssl_server_name: "opa"
      ssl_verify_depth: 2

  - name: cors
    config:
      origins:
        - "https://app.fmsec.shop"
        - "https://localhost:9444"
        - "https://localhost:9443"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - X-TOTP-Code
        - Content-Type
      credentials: true

  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"