_format_version: "3.0"

services:
  - name: backend-service
    url: http://api-backend:9000

    routes:
      - name: users-route
        paths:
          - /api/v1/users
        strip_path: false

      - name: products-route
        paths:
          - /api/v1/products
        strip_path: false

      - name: orders-route
        paths:
          - /api/v1/orders
        strip_path: false

      - name: auth-route
        paths:
          - /api/v1/auth
        strip_path: false

      - name: health-route
        paths:
          - /health

      - name: root-route
        paths:
          - /

plugins:
  # JWT verification is handled dynamically in backend/app/security/jwt_verify.py
  # to avoid static key/kid pinning in Kong.

  - name: jwt-hardening

  - name: hsts-header

  - name: opa-authz
    config:
      opa_url: "http://opa:8181/v1/data/authz"

  - name: cors
    config:
      origins:
        - "https://localhost:5174"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - DPoP
        - Content-Type
      credentials: true

  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
