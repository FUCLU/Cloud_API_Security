services:
  - name: backend-service
    url: https://api-backend:9000
    # Backend chạy HTTPS nội bộ và Kong phải verify certificate chain.
    # Internal CA is mounted as a Docker secret and configured in KONG_LUA_SSL_TRUSTED_CERTIFICATE.
    tls_verify: true
    tls_verify_depth: 2
    ca_certificates:
      - 11111111-1111-1111-1111-111111111111

    routes:
      - name: users-route
        paths:
          - /api/v1/users
        strip_path: false

      - name: products-route
        paths:
          - /api/v1/products
        strip_path: false

      - name: orders-route
        paths:
          - /api/v1/orders
        strip_path: false

      - name: auth-route
        paths:
          - /api/v1/auth
        strip_path: false

      - name: security-route
        paths:
          - /api/v1/security
        strip_path: false

      - name: health-route
        paths:
          - /health
        strip_path: false

      - name: root-route
        paths:
          - /
        strip_path: false

plugins:
  # JWT verification is handled dynamically in backend/app/security/jwt_verify.py
  # to avoid static key/kid pinning in Kong.

  - name: jwt-hardening

  - name: hsts-header

  - name: opa-authz
    config:
      opa_url: "https://opa:8181/v1/data/authz"
      ssl_verify: true
      ssl_server_name: "opa"
      ssl_verify_depth: 2

  - name: cors
    config:
      origins:
        - "https://app.fmsec.shop"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - X-TOTP-Code
        - Content-Type
      credentials: true

  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
