# Cách chạy:
#   Toàn bộ hệ thống:    docker compose up -d
#   Kèm dev tools:       docker compose --profile tools up -d
#   Kèm observability:   docker compose --profile obs up -d
#   Tất cả:              docker compose --profile tools --profile obs up -d


networks:
  edge-net:       # Tầng ngoài: frontend, kong, keycloak tiếp nhận traffic
  internal-net:   # Tầng trong: backend, db, cache, vault, opa — không expose ra ngoài
  obs-net:        # Tầng quan sát: loki, promtail, grafana tách biệt

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  prometheus_data:


# TẦNG 1 — HẠ TẦNG (Infrastructure)
# postgres, redis, vault

services:

  postgres:
    image: postgres:16
    container_name: api-postgres
    restart: unless-stopped
    env_file: .env                        # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    ports:
      - "${POSTGRES_PORT:-5434}:5432"     # chỉ dùng port này để kết nối từ máy host khi dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: api-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vault chạy dev mode — KHÔNG dùng cho production
  # Dev mode: dữ liệu không persist, tự unseal, token = root
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - ./vault/init:/vault/init
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chạy 1 lần duy nhất khi khởi động — init transit engine và tạo key
  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    volumes:
      - ./vault/init:/vault/init
      - ./vault/policies:/vault/policies
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sh /vault/init/vault-init.sh
    networks:
      - internal-net


# TẦNG 2 — XÁC THỰC (Auth / Identity)
# keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --features=dpop --import-realm
    ports:
      - "8082:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./idp/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    networks:
      - edge-net
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s      # keycloak khởi động chậm, cần chờ đủ


# TẦNG 3 — PHÂN QUYỀN (Policy)
# opa

  opa:
    image: openpolicyagent/opa:0.65.0
    container_name: opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--config-file=/config/opa-config.yaml"
      - "--set=decision_logs.console=true"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./opa/config:/config
      - ./opa/policies:/policies
      - ./opa/tests:/tests
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s


# TẦNG 4 — API GATEWAY
# kong — nhận traffic từ edge, verify JWT, rate limit, forward vào backend

  kong:
    image: kong:3.6
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled,opa-authz,jwt-hardening,hsts-header
      KONG_SSL_CERT: /certs/kong.crt
      KONG_SSL_CERT_KEY: /certs/kong.key
      KONG_SSL_PROTOCOLS: "TLSv1.3"
      # Chỉ mở HTTPS proxy; không expose HTTP plaintext qua Kong.
      KONG_PROXY_LISTEN: "0.0.0.0:8443 ssl http2"
      # Ép TLS 1.3 và yêu cầu client certificate ở proxy listener.
      # Client cert phải được ký bởi CA nội bộ trong certs/ca.crt.
      KONG_NGINX_PROXY_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_CLIENT_CERTIFICATE: /certs/ca.crt
      KONG_NGINX_PROXY_SSL_VERIFY_CLIENT: "on"
      KONG_NGINX_PROXY_SSL_VERIFY_DEPTH: "2"
    ports:
      - "8443:8443"   # HTTPS proxy
      - "8001:8001"   # Admin API (dev only — đừng expose production)
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
      - ./gateway/plugins/opa-authz:/usr/local/share/lua/5.1/kong/plugins/opa-authz
      - ./gateway/plugins/jwt-hardening:/usr/local/share/lua/5.1/kong/plugins/jwt-hardening
      - ./gateway/plugins/hsts-header:/usr/local/share/lua/5.1/kong/plugins/hsts-header
      - ./gateway/plugins:/usr/local/kong/plugins
      - ./certs:/certs:ro
    networks:
      - edge-net
      - internal-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5


# TẦNG 5 — ỨNG DỤNG (Application)
# backend, frontend

  backend:
    build:
      context: ./backend
    container_name: api-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      vault:
        condition: service_healthy
    ports:
      - "9000:9000"   # expose để dev test trực tiếp, bỏ khi production
    volumes:
      - ./backend/app:/app/app   # hot reload khi dev
      - ./certs:/certs:ro
    env_file: .env
    environment:
      PYTHONPATH: /app/app  
      OPA_URL: http://opa:8181
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_KEY_NAME: ${VAULT_KEY_NAME}
      VAULT_WRAPPED_DEK: ${VAULT_WRAPPED_DEK}
      REDIS_URL: redis://redis:6379
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import ssl, urllib.request; urllib.request.urlopen('https://localhost:9000/health', context=ssl._create_unverified_context())"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time args — Vite nhúng vào bundle lúc build
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KONG_URL: ${VITE_KONG_URL}
        VITE_REALM: ${VITE_REALM}
        VITE_CLIENT_ID: ${VITE_CLIENT_ID}
    container_name: api-frontend
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "5173:80"
      - "5174:443"
    volumes:
      - ./certs:/certs:ro
    networks:
      - edge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -k https://localhost:443 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


# TẦNG 6 — QUAN SÁT (Observability)   [profile: obs]
# Chạy thêm:  docker compose --profile obs up -d
# loki, promtail, grafana, prometheus, cadvisor

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped
    profiles: [obs]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml
      - ./observability/loki/rules:/etc/loki/rules
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    restart: unless-stopped
    profiles: [obs]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./EVIDENCE/logs:/logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - obs-net
      - internal-net

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    restart: unless-stopped
    profiles: [obs]
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: api-cadvisor
    restart: unless-stopped
    profiles: [obs]
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
    networks:
      - obs-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: api-prometheus
    restart: unless-stopped
    profiles: [obs]
    ports:
      - "9091:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      cadvisor:
        condition: service_started
    networks:
      - obs-net

# TẦNG 7 — CÔNG CỤ DEV (Dev Tools)   [profile: tools]
# Chạy thêm:  docker compose --profile tools up -d
# pgadmin

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    profiles: [tools]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
