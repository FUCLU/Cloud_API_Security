# Cách chạy:
#   Toàn bộ hệ thống:    docker compose up -d
#   Kèm dev tools:       docker compose --profile tools up -d
#   Kèm observability:   docker compose --profile obs up -d
#   Tất cả:              docker compose --profile tools --profile obs up -d


networks:
  dmz-net:        # DMZ/Edge: frontend, WAF, Kong, Keycloak public endpoints
  app-net:        # Application/Private: backend, OPA, Redis, internal app traffic
  data-net:       # Data/Security: Postgres, Vault, KMS/secret operations
  vault-backend-net: # Private backend network only between Vault TLS proxy and Vault dev backend
  obs-net:        # Observability: Loki, Promtail, Grafana, Prometheus

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  prometheus_data:
  keycloak_data:
    external: true
    name: cloud_api_security_keycloak_data

secrets:
  internal_ca_cert:
    file: ./internal-certs/ca.crt
  app_tls_cert:
    file: ./certs/app.crt
  app_tls_key:
    file: ./certs/app.key
  auth_tls_cert:
    file: ./certs/auth.crt
  auth_tls_key:
    file: ./certs/auth.key
  kong_tls_cert:
    file: ./certs/kong.crt
  kong_tls_key:
    file: ./certs/kong.key
  backend_tls_cert:
    file: ./internal-certs/backend.crt
  backend_tls_key:
    file: ./internal-certs/backend.key
  opa_tls_cert:
    file: ./internal-certs/opa.crt
  opa_tls_key:
    file: ./internal-certs/opa.key
  postgres_tls_cert:
    file: ./internal-certs/postgres.crt
  postgres_tls_key:
    file: ./internal-certs/postgres.key
  redis_tls_cert:
    file: ./internal-certs/redis.crt
  redis_tls_key:
    file: ./internal-certs/redis.key
  vault_tls_cert:
    file: ./internal-certs/vault.crt
  vault_tls_key:
    file: ./internal-certs/vault.key
  mtls_client_cert:
    file: ./internal-certs/mtls/client.crt
  mtls_client_key:
    file: ./internal-certs/mtls/client.key


# TẦNG 1 — HẠ TẦNG (Infrastructure)
# postgres, redis, vault

services:

  postgres:
    image: postgres:16
    container_name: api-postgres
    restart: unless-stopped
    env_file: .env                        # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cp /run/secrets/postgres_tls_cert /var/lib/postgresql/server.crt
        cp /run/secrets/postgres_tls_key /var/lib/postgresql/server.key
        chown postgres:postgres /var/lib/postgresql/server.crt /var/lib/postgresql/server.key
        chmod 600 /var/lib/postgresql/server.key
        printf '%s\n' \
          'local all all trust' \
          'hostnossl all all all reject' \
          'hostssl all all all scram-sha-256' \
          > /var/lib/postgresql/pg_hba_tls.conf
        chown postgres:postgres /var/lib/postgresql/pg_hba_tls.conf
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/var/lib/postgresql/server.crt \
          -c ssl_key_file=/var/lib/postgresql/server.key \
          -c hba_file=/var/lib/postgresql/pg_hba_tls.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_tls_cert
      - postgres_tls_key
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: api-redis
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /tmp/redis-tls
        cp /run/secrets/redis_tls_cert /tmp/redis-tls/redis.crt
        cp /run/secrets/redis_tls_key /tmp/redis-tls/redis.key
        cp /run/secrets/internal_ca_cert /tmp/redis-tls/ca.crt
        chown -R redis:redis /tmp/redis-tls
        chmod 600 /tmp/redis-tls/redis.key
        exec docker-entrypoint.sh redis-server \
          --port 0 \
          --tls-port 6379 \
          --tls-cert-file /tmp/redis-tls/redis.crt \
          --tls-key-file /tmp/redis-tls/redis.key \
          --tls-ca-cert-file /tmp/redis-tls/ca.crt \
          --tls-auth-clients no
    secrets:
      - internal_ca_cert
      - redis_tls_cert
      - redis_tls_key
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/tmp/redis-tls/ca.crt", "-h", "redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vault dev backend — KHÔNG dùng cho production.
  # Service này chỉ nằm sau TLS proxy nội bộ `vault`.
  vault-dev:
    image: hashicorp/vault:1.15
    container_name: vault-dev
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - ./vault/init:/vault/init
    networks:
      - vault-backend-net
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: nginx:1.27-alpine
    container_name: vault
    restart: unless-stopped
    depends_on:
      vault-dev:
        condition: service_healthy
    volumes:
      - ./vault/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    secrets:
      - vault_tls_cert
      - vault_tls_key
    networks:
      - data-net
      - vault-backend-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chạy 1 lần duy nhất khi khởi động — init transit engine và tạo key
  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: https://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_CACERT: /run/secrets/internal_ca_cert
    volumes:
      - ./vault/init:/vault/init
      - ./vault/policies:/vault/policies
    secrets:
      - internal_ca_cert
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sh /vault/init/vault-init.sh
    networks:
      - data-net


# TẦNG 2 — XÁC THỰC (Auth / Identity)
# keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --https-certificate-file=/run/secrets/auth_tls_cert
      - --https-certificate-key-file=/run/secrets/auth_tls_key
      - --https-port=8443
      - --http-enabled=false
    ports:
      - "127.0.0.1:8082:8443"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_PORT: "8443"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./idp/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    secrets:
      - auth_tls_cert
      - auth_tls_key
    networks:
      dmz-net:
        aliases:
          - auth.fmsec.shop
      app-net:
        aliases:
          - auth.fmsec.shop
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s      # keycloak khởi động chậm, cần chờ đủ


# TẦNG 3 — PHÂN QUYỀN (Policy)
# opa

  opa:
    image: openpolicyagent/opa:0.65.0
    container_name: opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--tls-cert-file=/run/secrets/opa_tls_cert"
      - "--tls-private-key-file=/run/secrets/opa_tls_key"
      - "--config-file=/config/opa-config.yaml"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - ./opa/config:/config
      - ./opa/policies:/policies
      - ./opa/tests:/tests
    secrets:
      - opa_tls_cert
      - opa_tls_key
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s


# TẦNG 4 — API GATEWAY
# kong — nhận traffic từ edge, verify JWT, rate limit, forward vào backend

  kong:
    image: kong:3.6
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled,opa-authz,jwt-hardening,hsts-header
      KONG_SSL_CERT: /run/secrets/kong_tls_cert
      KONG_SSL_CERT_KEY: /run/secrets/kong_tls_key
      KONG_SSL_PROTOCOLS: "TLSv1.3"
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: /run/secrets/internal_ca_cert
      KONG_LUA_SSL_VERIFY_DEPTH: "2"
      KONG_NGINX_PROXY_PROXY_SSL_TRUSTED_CERTIFICATE: /run/secrets/internal_ca_cert
      KONG_NGINX_PROXY_PROXY_SSL_VERIFY_DEPTH: "2"
      KONG_NGINX_PROXY_PROXY_SSL_SERVER_NAME: "on"
      # Chỉ mở HTTPS proxy; không expose HTTP plaintext qua Kong.
      KONG_PROXY_LISTEN: "0.0.0.0:8443 ssl http2"
      # Ép TLS 1.3 và yêu cầu client certificate ở proxy listener.
      # Client cert phải được ký bởi CA nội bộ trong certs/ca.crt.
      KONG_NGINX_PROXY_SSL_PROTOCOLS: "TLSv1.3"
      KONG_NGINX_PROXY_SSL_CLIENT_CERTIFICATE: /run/secrets/internal_ca_cert
      KONG_NGINX_PROXY_SSL_VERIFY_CLIENT: "on"
      KONG_NGINX_PROXY_SSL_VERIFY_DEPTH: "2"
      KONG_ADMIN_LISTEN: "off"
    ports: []
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
      - ./gateway/plugins/opa-authz:/usr/local/share/lua/5.1/kong/plugins/opa-authz
      - ./gateway/plugins/jwt-hardening:/usr/local/share/lua/5.1/kong/plugins/jwt-hardening
      - ./gateway/plugins/hsts-header:/usr/local/share/lua/5.1/kong/plugins/hsts-header
      - ./gateway/plugins:/usr/local/kong/plugins
    secrets:
      - internal_ca_cert
      - kong_tls_cert
      - kong_tls_key
    networks:
      - dmz-net
      - app-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  waf:
    image: nginx:1.27-alpine
    container_name: api-waf
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ./waf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    secrets:
      - internal_ca_cert
      - kong_tls_cert
      - kong_tls_key
      - mtls_client_cert
      - mtls_client_key
    networks:
      - dmz-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5


# TẦNG 5 — ỨNG DỤNG (Application)
# backend, frontend

  backend:
    build:
      context: ./backend
    container_name: api-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      vault:
        condition: service_healthy
    secrets:
      - internal_ca_cert
      - backend_tls_cert
      - backend_tls_key
    env_file: .env
    environment:
      PYTHONPATH: /app/app  
      BACKEND_TLS_CERT_PATH: /run/secrets/backend_tls_cert
      BACKEND_TLS_KEY_PATH: /run/secrets/backend_tls_key
      INTERNAL_CA_CERT_PATH: /run/secrets/internal_ca_cert
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=verify-full&sslrootcert=/run/secrets/internal_ca_cert"
      KEYCLOAK_URL: https://auth.fmsec.shop:8443
      KEYCLOAK_PUBLIC_URL: ${VITE_KEYCLOAK_URL}
      KEYCLOAK_CLIENT_ID: ${VITE_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      FRONTEND_URL: https://app.fmsec.shop
      OPA_URL: https://opa:8181
      VAULT_ADDR: https://vault:8200
      VAULT_CACERT: /run/secrets/internal_ca_cert
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_KEY_NAME: ${VAULT_KEY_NAME}
      VAULT_WRAPPED_DEK: ${VAULT_WRAPPED_DEK}
      REDIS_URL: rediss://redis:6379/0
      REDIS_SSL_CA_CERTS: /run/secrets/internal_ca_cert
    networks:
      - app-net
      - data-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import ssl, urllib.request; urllib.request.urlopen('https://localhost:9000/health', context=ssl._create_unverified_context())"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time args — Vite nhúng vào bundle lúc build
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KONG_URL: ${VITE_KONG_URL}
        VITE_REALM: ${VITE_REALM}
        VITE_CLIENT_ID: ${VITE_CLIENT_ID}
    container_name: api-frontend
    restart: unless-stopped
    depends_on:
      waf:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    secrets:
      - internal_ca_cert
      - app_tls_cert
      - app_tls_key
      - auth_tls_cert
      - auth_tls_key
      - mtls_client_cert
      - mtls_client_key
    networks:
      - dmz-net
    healthcheck:
      test: ["CMD-SHELL", "curl -k https://localhost:443 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


# TẦNG 6 — QUAN SÁT (Observability)   [profile: obs]
# Chạy thêm:  docker compose --profile obs up -d
# loki, promtail, grafana, prometheus, cadvisor

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped
    profiles: [obs]
    ports: []
    volumes:
      - loki_data:/loki
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml
      - ./observability/loki/rules:/etc/loki/rules
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    restart: unless-stopped
    profiles: [obs]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./EVIDENCE/logs:/logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - obs-net
      - app-net

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    restart: unless-stopped
    profiles: [obs]
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: api-cadvisor
    restart: unless-stopped
    profiles: [obs]
    ports: []
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
    networks:
      - obs-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: api-prometheus
    restart: unless-stopped
    profiles: [obs]
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      cadvisor:
        condition: service_started
    networks:
      - obs-net

# TẦNG 7 — CÔNG CỤ DEV (Dev Tools)   [profile: tools]
# Chạy thêm:  docker compose --profile tools up -d
# pgadmin

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    profiles: [tools]
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
